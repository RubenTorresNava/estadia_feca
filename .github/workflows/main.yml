name: Deploy FecaStore
on:
  push:
    branches: [ main ] # O tu rama de producción

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ruben/Documentos/Estadia/estadia_feca
            git pull origin main
            # El servidor construye la imagen localmente usando tu Dockerfile
            docker-compose -f docker-compose.prod.yml up -d --build
